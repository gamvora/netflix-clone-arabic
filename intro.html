<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NETFLIXY</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23E50914' font-weight='900' font-family='Arial Black'>N</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/intro.css?v=181">
</head>
<body>
  <div class="intro-container" id="introContainer">

    <!-- Skip Button -->
    <button class="intro-skip" id="skipBtn" aria-label="تخطي">
      تخطي
      <i class="arrow">›</i>
    </button>

    <!-- Mute Button -->
    <button class="intro-mute" id="muteBtn" aria-label="كتم الصوت" title="صوت/كتم">
      <svg class="icon-sound" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
      <svg class="icon-muted" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
      </svg>
    </button>

    <!-- Netflix-style N Animation -->
    <div class="netflix-intro" id="netflixIntro">
      <!-- The big N logo -->
      <div class="n-logo-wrap">
        <svg class="n-logo-svg" viewBox="0 0 500 700" preserveAspectRatio="xMidYMid meet">
          <defs>
            <clipPath id="nClipPath">
              <!-- N letter shape -->
              <path d="M 80 50 L 200 50 L 200 400 L 300 50 L 420 50 L 420 650 L 300 650 L 300 300 L 200 650 L 80 650 Z"/>
            </clipPath>
            <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ff0a16"/>
              <stop offset="50%" stop-color="#e50914"/>
              <stop offset="100%" stop-color="#a00610"/>
            </linearGradient>
          </defs>
          <!-- Base red N -->
          <rect x="80" y="50" width="340" height="600" fill="url(#redGrad)" clip-path="url(#nClipPath)"/>
          <!-- Light streaks that sweep through -->
          <g clip-path="url(#nClipPath)">
            <rect class="streak streak-1" x="-200" y="0" width="80" height="700" fill="rgba(255,255,255,0.4)"/>
            <rect class="streak streak-2" x="-400" y="0" width="60" height="700" fill="rgba(255,200,200,0.3)"/>
            <rect class="streak streak-3" x="-600" y="0" width="100" height="700" fill="rgba(255,255,255,0.2)"/>
          </g>
        </svg>

        <!-- Tall vertical bars (the famous falling light bars) -->
        <div class="light-bars">
          <span class="bar bar-1"></span>
          <span class="bar bar-2"></span>
          <span class="bar bar-3"></span>
          <span class="bar bar-4"></span>
          <span class="bar bar-5"></span>
        </div>

        <!-- Glow burst -->
        <div class="glow-burst"></div>
      </div>

      <!-- NETFLIXY wordmark (appears after N) -->
      <!-- dir="ltr" so Latin letters render left-to-right: N-E-T-F-L-I-X-Y
           which places the Y at the right end of the wordmark -->
      <div class="wordmark" id="wordmark" dir="ltr">
        <span class="wordmark-main">NETFLIX</span><span class="wordmark-y">Y</span>
      </div>

      <!-- Tagline -->
      <div class="tagline" id="tagline">استمتع بتجربة المشاهدة الكاملة</div>
    </div>

    <!-- Loading indicator before redirect -->
    <div class="intro-loading" id="introLoading">
      <div class="loading-text">جاري التحميل...</div>
    </div>
  </div>

  <script src="js/intro.js?v=181"></script>
</body>
</html>
